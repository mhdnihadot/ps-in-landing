<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to PropertySeller.com | Premium Real Estate Platform</title>

    <!-- Basic SEO -->
    <meta name="description"
        content="PropertySeller.in has moved to PropertySeller.com. Visit our official global platform to explore premium properties and manage your real estate listings.">
    <meta name="keywords"
        content="real estate, properties, dubai real estate, propertyseller, property seller in, premium properties">
    <link rel="canonical" href="https://propertyseller.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Open Graph / Social -->
    <meta property="og:title" content="PropertySeller - Premium Real Estate Platform">
    <meta property="og:description"
        content="Our official platform has moved. Visit PropertySeller.com for premium real estate listings and tools.">
    <meta property="og:url" content="https://propertyseller.in">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="compass-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
            </div>


            <h1 class="title">You are at propertyseller<span class="highlight">.in</span></h1>

            <p class="description">
                Our official and main platform has moved to its permanent home. To explore premium properties, manage
                your listings, and access our full suite of tools, please visit our global website.
            </p>

            <button id="redirect-btn" class="cta-button">
                <span>Continue to PropertySeller.com</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
